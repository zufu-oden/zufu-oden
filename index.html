<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>煮夫麻辣關東煮 點餐</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
  :root { --navy:#0e2540; --red:#c0392b; --gold:#c9a84c; --cream:#f0ece4; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--navy); color:var(--cream); font-family:'Noto Sans TC',sans-serif; min-height:100vh; padding-bottom:130px; }
  .header { background:linear-gradient(180deg,#0a1c30 0%,var(--navy) 100%); text-align:center; padding:24px 16px 16px; border-bottom:1px solid rgba(201,168,76,0.3); position:sticky; top:0; z-index:200; }
  .header-brand { font-family:'Noto Serif TC',serif; font-size:12px; color:var(--gold); letter-spacing:6px; margin-bottom:4px; }
  .header-title { font-size:22px; font-weight:700; letter-spacing:3px; }
  .header-sub { font-size:10px; color:rgba(240,236,228,0.4); letter-spacing:3px; margin-top:4px; }
  .spice-bar { padding:12px 16px; background:rgba(255,255,255,0.03); border-bottom:1px solid rgba(255,255,255,0.08); }
  .spice-label { font-size:12px; color:var(--gold); letter-spacing:2px; margin-bottom:8px; }
  .spice-options { display:flex; gap:8px; flex-wrap:wrap; }
  .spice-btn { padding:5px 12px; border-radius:20px; border:1px solid rgba(255,255,255,0.2); background:transparent; color:rgba(240,236,228,0.7); font-size:12px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:0.2s; }
  .spice-btn.active { background:var(--red); border-color:var(--red); color:#fff; }
  .tabs { display:flex; overflow-x:auto; padding:12px 16px; gap:8px; scrollbar-width:none; border-bottom:1px solid rgba(255,255,255,0.08); }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { white-space:nowrap; padding:6px 14px; border-radius:20px; border:1px solid rgba(201,168,76,0.3); background:transparent; color:rgba(240,236,228,0.6); font-size:12px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:0.2s; }
  .tab.active { background:var(--gold); border-color:var(--gold); color:var(--navy); font-weight:700; }
  .section { padding:0 16px; }
  .sec-hdr { display:flex; align-items:center; gap:10px; padding:20px 0 12px; }
  .sec-title { font-family:'Noto Serif TC',serif; font-size:16px; color:var(--gold); letter-spacing:2px; }
  .sec-badge { font-size:11px; background:rgba(201,168,76,0.15); border:1px solid rgba(201,168,76,0.3); color:var(--gold); padding:2px 8px; border-radius:10px; }
  .sec-line { flex:1; height:1px; background:rgba(201,168,76,0.15); }
  .item { display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
  .item-name { font-size:15px; letter-spacing:1px; }
  .item-price { font-size:12px; color:rgba(240,236,228,0.45); margin-top:2px; }
  .counter { display:flex; align-items:center; background:rgba(255,255,255,0.05); border-radius:24px; overflow:hidden; border:1px solid rgba(255,255,255,0.1); }
  .cbtn { width:36px; height:36px; background:transparent; border:none; color:var(--cream); font-size:18px; cursor:pointer; }
  .cbtn.plus { color:var(--gold); }
  .cnum { min-width:28px; text-align:center; font-size:15px; font-weight:700; }
  .cnum.active { color:var(--gold); }
  .cart-bar { position:fixed; bottom:0; left:0; right:0; padding:12px 16px; background:linear-gradient(180deg,rgba(14,37,64,0.97) 0%,#0a1c30 100%); border-top:1px solid rgba(201,168,76,0.3); z-index:100; }
  .cart-summary { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; font-size:13px; color:rgba(240,236,228,0.6); }
  .cart-total { color:var(--gold); font-weight:700; font-size:18px; }
  .order-btn { width:100%; padding:14px; background:linear-gradient(135deg,var(--red),#e74c3c); border:none; border-radius:12px; color:#fff; font-size:16px; font-weight:700; letter-spacing:3px; cursor:pointer; transition:0.3s; font-family:'Noto Sans TC',sans-serif; }
  .order-btn:disabled { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.3); }
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:300; align-items:flex-end; overflow-y:auto; }
  .overlay.show { display:flex; }
  .modal { background:#0e2540; border-radius:20px 20px 0 0; width:100%; max-height:92vh; overflow-y:auto; padding:24px 20px 40px; border-top:2px solid rgba(201,168,76,0.4); -webkit-overflow-scrolling:touch; }
  .modal-title { font-family:'Noto Serif TC',serif; font-size:18px; color:var(--gold); text-align:center; letter-spacing:3px; margin-bottom:20px; }
  .mrow { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.06); font-size:14px; }
  .mdiv { height:1px; background:rgba(201,168,76,0.2); margin:16px 0; }
  .mtotal { display:flex; justify-content:space-between; font-size:17px; font-weight:700; margin-bottom:8px; }
  .mspice { font-size:12px; color:rgba(240,236,228,0.5); margin-bottom:16px; }
  .mremark-label { font-size:12px; color:var(--gold); margin-bottom:8px; letter-spacing:1px; }
  .mremark { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:10px; color:var(--cream); font-size:16px; font-family:'Noto Sans TC',sans-serif; resize:vertical; }
  .mremark::placeholder { color:rgba(255,255,255,0.25); }
  .mname { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:10px; color:var(--cream); font-size:16px; font-family:'Noto Sans TC',sans-serif; margin-bottom:12px; }
  .mname::placeholder { color:rgba(255,255,255,0.25); }
  .mbtns { display:flex; gap:10px; margin-top:12px; }
  .bcancel { flex:1; padding:13px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15); border-radius:10px; color:var(--cream); font-size:14px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:0.2s; }
  .bconfirm { flex:2; padding:13px; background:linear-gradient(135deg,var(--red),#e74c3c); border:none; border-radius:10px; color:#fff; font-size:14px; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:0.2s; }
  .bconfirm:disabled { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.3); }
  .sending-msg { text-align:center; font-size:13px; color:var(--gold); padding:8px 0; min-height:24px; }
  .success { display:none; position:fixed; inset:0; background:var(--navy); z-index:400; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:32px; }
  .success.show { display:flex; }
  .sicon { font-size:64px; margin-bottom:20px; }
  .stitle { font-family:'Noto Serif TC',serif; font-size:22px; color:var(--gold); letter-spacing:3px; margin-bottom:12px; }
  .smsg { font-size:14px; color:rgba(240,236,228,0.6); line-height:1.8; margin-bottom:24px; }
  .sdetail { background:rgba(255,255,255,0.05); border-radius:12px; padding:16px; width:100%; max-width:320px; text-align:left; margin-bottom:24px; font-size:13px; line-height:2; }
  .breset { padding:13px 40px; background:var(--gold); border:none; border-radius:24px; color:var(--navy); font-weight:700; font-size:15px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; letter-spacing:2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">麻辣關東煮</div>
  <div class="header-title">煮　夫</div>
  <div class="header-sub">マスター おでん</div>
</div>

<div class="spice-bar">
  <div class="spice-label">🌶 選擇辣度</div>
  <div class="spice-options" id="spiceBox"></div>
</div>

<div class="tabs" id="tabBox"></div>
<div class="section" id="menuBox"></div>

<div class="cart-bar">
  <div class="cart-summary">
    <span id="cartCount">尚未選擇任何品項</span>
    <span class="cart-total" id="cartTotal"></span>
  </div>
  <button class="order-btn" id="orderBtn" disabled onclick="showModal()">確認訂單</button>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">確認訂單內容</div>
    <div id="modalItems"></div>
    <div class="mdiv"></div>
    <div class="mtotal"><span>合計</span><span id="modalTotal" style="color:var(--gold)"></span></div>
    <div class="mspice" id="modalSpice"></div>
    <input class="mname" id="customerName" placeholder="請輸入您的稱呼或手機後3碼" />
    <div class="mremark-label">備註（例：幾點取餐、乾的、湯少等）<br>季節時蔬請參考菜單下方資訊</div>
    <textarea class="mremark" id="remark" rows="2" placeholder=""></textarea>
    <div class="sending-msg" id="sendingMsg"></div>
    <div class="mbtns">
      <button class="bcancel" id="cancelBtn" onclick="hideModal()">返回修改</button>
      <button class="bconfirm" id="confirmBtn" onclick="confirmOrder()">送出訂單 🎉</button>
    </div>
  </div>
</div>

<div class="success" id="successScreen">
  <div class="sicon">🎉</div>
  <div class="stitle">訂單已送出！</div>
  <div class="smsg">即將跳轉到 LINE 對話視窗<br>請按「傳送」完成訂單 😊</div>
  <div class="sdetail" id="successDetail"></div>
  <button class="breset" onclick="resetOrder()">再點一單</button>
</div>

<script>
// =============================================
// ⚙️ 設定區 — 填入你的 Google Apps Script 網址
// =============================================
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxdLYYqDSm_NhAsmb0-2zv2wdd8IJn-YPpVuFiVxCha5XDcVqLfHExTvQcyDs1kRIUA/exec';
// =============================================

var currentSpice = '原味';
var qty = {};

var SPICES = ['原味','微微辣','微辣','小辣','中辣','大辣'];

var MENU = [
  { id:'s1', title:'5個20元', badge:'', up:4, gp:null, gc:null,
    items:['魚卵卷','鑫鑫腸','黃金魚蛋','鴨肉丸','蒟蒻條','鳥蛋','凍豆腐'] },
  { id:'s2', title:'3個20元', badge:'', up:null, gp:20, gc:3,
    items:['豆干','海帶','魚餃','燕餃','熱狗','水晶餃'] },
  { id:'s3', title:'2個25元', badge:'', up:null, gp:25, gc:2,
    items:['菜頭','黑豆干','蘭花干','黑輪','米血','豆包','百頁豆腐','黃金豆腐','龍蝦棒'] },
  { id:'s4', title:'1個10元', badge:'', up:10, gp:null, gc:null,
    items:['貢丸','花枝丸','黑輪片','魚包蛋','龍蝦沙拉','麻糬燒','起士麻吉燒','芝麻麻吉燒','花生麻吉燒'] },
  { id:'s5', title:'1個15元', badge:'', up:15, gp:null, gc:null,
    items:['水煮蛋','油蔥貢丸','包肉貢丸','魚板燒','芋粿條','金針菇','杏鮑菇','小香菇'] },
  { id:'s6', title:'肉　類', badge:'', up:null, gp:null, gc:null,
    items:[['豬肉片',30],['牛肉片',30],['雞胸肉片',30],['德國香腸',25],['招牌豆腐',25],['招牌鴨血',25],['招牌綜合',25],['豆皮',20]] },
  { id:'s7', title:'蔬菜類', badge:'', up:null, gp:null, gc:null,
    items:[['高麗菜',20],['大陸妹',20],['花椰菜',20],['空心菜',20],['筍子',20],['菠菜',20],['茼蒿',20]] },
  { id:'s8', title:'主食類', badge:'', up:null, gp:null, gc:null,
    items:[['冬粉',15],['寬粉',15],['意麵',15],['王子麵',15],['媽媽麵',15],['蒸煮麵',15],['雞絲麵',15],['烏龍麵',25],['關廟麵',25],['韓國拉麵',25]] }
];

function getItemName(item) { return Array.isArray(item) ? item[0] : item; }
function getItemFixedPrice(item) { return Array.isArray(item) ? item[1] : null; }
function getUnitPrice(sec, item) {
  if (sec.up !== null) return sec.up;
  var fp = getItemFixedPrice(item);
  if (fp !== null) return fp;
  if (sec.gp !== null) return sec.gp / sec.gc;
  return 0;
}
function getPriceLabel(sec, item) {
  if (sec.up !== null) return '';
  var fp = getItemFixedPrice(item);
  if (fp !== null) return '$' + fp;
  if (sec.gp !== null) return sec.gc + '個 $' + sec.gp;
  return '';
}
function makeKey(sid, name) { return sid + '__' + name; }

function formatTime() {
  var now = new Date();
  var year = now.getFullYear();
  var month = String(now.getMonth() + 1).padStart(2, '0');
  var day = String(now.getDate()).padStart(2, '0');
  var hours = String(now.getHours()).padStart(2, '0');
  var minutes = String(now.getMinutes()).padStart(2, '0');
  return year + '-' + month + '-' + day + ' ' + hours + ':' + minutes;
}

function changeQty(sid, name, delta) {
  var k = makeKey(sid, name);
  qty[k] = Math.max(0, (qty[k] || 0) + delta);
  var el = document.getElementById('n_' + k);
  if (el) {
    el.textContent = qty[k];
    qty[k] > 0 ? el.classList.add('active') : el.classList.remove('active');
  }
  updateCart();
}

function calcAll() {
  var total = 0, count = 0;
  for (var k in qty) {
    if (!qty[k]) continue;
    var parts = k.split('__');
    var sid = parts[0], name = parts[1];
    var sec = MENU.filter(function(s){ return s.id === sid; })[0];
    if (!sec) continue;
    var item = sec.items.filter(function(i){ return getItemName(i) === name; })[0];
    if (!item) continue;
    total += getUnitPrice(sec, item) * qty[k];
    count += qty[k];
  }
  return { total: Math.round(total), count: count };
}

function updateCart() {
  var r = calcAll();
  if (r.count === 0) {
    document.getElementById('cartCount').textContent = '尚未選擇任何品項';
    document.getElementById('cartTotal').textContent = '';
    document.getElementById('orderBtn').disabled = true;
  } else {
    document.getElementById('cartCount').textContent = '已選 ' + r.count + ' 項';
    document.getElementById('cartTotal').textContent = '$' + r.total;
    document.getElementById('orderBtn').disabled = false;
  }
}

function buildOrderLines() {
  var lines = [];
  var total = 0;
  for (var k in qty) {
    if (!qty[k]) continue;
    var parts = k.split('__');
    var sid = parts[0], name = parts[1];
    var sec = MENU.filter(function(s){ return s.id === sid; })[0];
    if (!sec) continue;
    var item = sec.items.filter(function(i){ return getItemName(i) === name; })[0];
    if (!item) continue;
    var sub = Math.round(getUnitPrice(sec, item) * qty[k]);
    total += sub;
    lines.push({ name: name, qty: qty[k], subtotal: sub });
  }
  return { lines: lines, total: Math.round(total) };
}

function showModal() {
  var r = buildOrderLines();
  var html = '';
  r.lines.forEach(function(l) {
    html += '<div class="mrow"><span>' + l.name + ' x ' + l.qty + '</span><span style="color:var(--gold)">$' + l.subtotal + '</span></div>';
  });
  document.getElementById('modalItems').innerHTML = html || '<p style="text-align:center;opacity:0.4;padding:20px">沒有品項</p>';
  document.getElementById('modalTotal').textContent = '$' + r.total;
  document.getElementById('modalSpice').textContent = '🌶 辣度：' + currentSpice;
  document.getElementById('sendingMsg').textContent = '';
  document.getElementById('overlay').classList.add('show');
}

function hideModal() { document.getElementById('overlay').classList.remove('show'); }

function confirmOrder() {
  var customerName = document.getElementById('customerName').value.trim();
  var remark = document.getElementById('remark').value.trim();
  var r = buildOrderLines();

  if (!customerName) {
    document.getElementById('sendingMsg').textContent = '⚠️ 請輸入手機後3碼或稱呼';
    return;
  }

  // Build order text
  var orderText = '🔔 新訂單！' + formatTime() + '\n';
  orderText += '👤 ' + customerName + '\n';
  orderText += '──────────\n';
  orderText += '🌶 辣度：' + currentSpice + '\n';
  r.lines.forEach(function(l) {
    orderText += l.name + ' x' + l.qty + '　$' + l.subtotal + '\n';
  });
  orderText += '──────────\n';
  orderText += '💰 合計：$' + r.total;
  if (remark) orderText += '\n📝 備註：' + remark;

  // Show success screen first
  var detail = orderText.replace(/\n/g, '<br>');
  document.getElementById('successDetail').innerHTML = detail;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('successScreen').classList.add('show');

  // Redirect to LINE official account chat with pre-filled message
  setTimeout(function() {
    var lineUrl = 'https://line.me/R/oaMessage/@301xmlkb/?' + encodeURIComponent(orderText);
    window.location.href = lineUrl;
  }, 1500);
}

function showSuccess(name, orderText, total) {
  var detail = orderText.replace(/\n/g, '<br>');
  document.getElementById('successDetail').innerHTML = detail;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('successScreen').classList.add('show');
}

function resetOrder() {
  qty = {};
  var els = document.querySelectorAll('.cnum');
  for (var i = 0; i < els.length; i++) { els[i].textContent = '0'; els[i].classList.remove('active'); }
  document.getElementById('remark').value = '';
  document.getElementById('customerName').value = '';
  document.getElementById('confirmBtn').disabled = false;
  document.getElementById('cancelBtn').disabled = false;
  document.getElementById('successScreen').classList.remove('show');
  updateCart();
}

// Build spice buttons
(function() {
  var box = document.getElementById('spiceBox');
  SPICES.forEach(function(s) {
    var b = document.createElement('button');
    b.className = 'spice-btn' + (s === '原味' ? ' active' : '');
    b.textContent = s;
    b.onclick = (function(val, btn) {
      return function() {
        currentSpice = val;
        document.querySelectorAll('.spice-btn').forEach(function(x){ x.classList.remove('active'); });
        btn.classList.add('active');
      };
    })(s, b);
    box.appendChild(b);
  });
})();

// Build tabs and menu
(function() {
  var tabBox = document.getElementById('tabBox');
  var menuBox = document.getElementById('menuBox');

  MENU.forEach(function(sec, idx) {
    var tab = document.createElement('button');
    tab.className = 'tab' + (idx === 0 ? ' active' : '');
    tab.textContent = sec.title;
    tab.onclick = (function(sid, t) {
      return function() {
        document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
        t.classList.add('active');
        document.getElementById(sid).scrollIntoView({ behavior:'smooth', block:'start' });
      };
    })(sec.id, tab);
    tabBox.appendChild(tab);

    var hdr = document.createElement('div');
    hdr.className = 'sec-hdr';
    hdr.id = sec.id;
    hdr.innerHTML = '<span class="sec-title">' + sec.title + '</span>' +
      (sec.badge ? '<span class="sec-badge">' + sec.badge + '</span>' : '') +
      '<span class="sec-line"></span>';
    menuBox.appendChild(hdr);

    sec.items.forEach(function(item) {
      var name = getItemName(item);
      var k = makeKey(sec.id, name);
      var priceLabel = getPriceLabel(sec, item);

      var row = document.createElement('div');
      row.className = 'item';

      var left = document.createElement('div');
      left.innerHTML = '<div class="item-name">' + name + '</div><div class="item-price">' + priceLabel + '</div>';

      var counter = document.createElement('div');
      counter.className = 'counter';

      var minus = document.createElement('button');
      minus.className = 'cbtn';
      minus.textContent = '－';
      minus.onclick = (function(sid, n) { return function(){ changeQty(sid, n, -1); }; })(sec.id, name);

      var num = document.createElement('span');
      num.className = 'cnum';
      num.id = 'n_' + k;
      num.textContent = '0';

      var plus = document.createElement('button');
      plus.className = 'cbtn plus';
      plus.textContent = '＋';
      plus.onclick = (function(sid, n) { return function(){ changeQty(sid, n, 1); }; })(sec.id, name);

      counter.appendChild(minus);
      counter.appendChild(num);
      counter.appendChild(plus);
      row.appendChild(left);
      row.appendChild(counter);
      menuBox.appendChild(row);
    });
  });
})();

updateCart();
</script>
</body>
</html>
